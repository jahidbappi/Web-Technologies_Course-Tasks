<html>
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script>
      document.write("<h1>Calculator</h1>");
    </script>

    <div class="calculator-wrap">
      <input
        type="text"
        id="display"
        readonly
        value="0"
      />

      <div class="calc-grid">
        <button type="button" class="calc-btn calc-btn-clear" onclick="clearDisplay();">C</button>
        <button type="button" class="calc-btn calc-btn-cross" onclick="backspace();">×</button>
        <button type="button" class="calc-btn calc-btn-op" onclick="appendToDisplay('/');">/</button>
        <button type="button" class="calc-btn calc-btn-op" onclick="appendToDisplay('*');">*</button>
        <button type="button" class="calc-btn calc-btn-num" onclick="appendToDisplay('7');">7</button>
        <button type="button" class="calc-btn calc-btn-num" onclick="appendToDisplay('8');">8</button>
        <button type="button" class="calc-btn calc-btn-num" onclick="appendToDisplay('9');">9</button>
        <button type="button" class="calc-btn calc-btn-op" onclick="appendToDisplay('-');">-</button>
        <button type="button" class="calc-btn calc-btn-num" onclick="appendToDisplay('4');">4</button>
        <button type="button" class="calc-btn calc-btn-num" onclick="appendToDisplay('5');">5</button>
        <button type="button" class="calc-btn calc-btn-num" onclick="appendToDisplay('6');">6</button>
        <button type="button" class="calc-btn calc-btn-op" onclick="appendToDisplay('+');">+</button>
        <button type="button" class="calc-btn calc-btn-num" onclick="appendToDisplay('1');">1</button>
        <button type="button" class="calc-btn calc-btn-num" onclick="appendToDisplay('2');">2</button>
        <button type="button" class="calc-btn calc-btn-num" onclick="appendToDisplay('3');">3</button>
        <button type="button" class="calc-btn calc-btn-equals calc-btn-tall" onclick="calculate();">=</button>
        <button type="button" class="calc-btn calc-btn-num" onclick="appendToDisplay('0');">0</button>
        <button type="button" class="calc-btn calc-btn-extra" onclick="appendToDisplay('(');">(</button>
        <button type="button" class="calc-btn calc-btn-extra" onclick="appendToDisplay(')');">)</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
