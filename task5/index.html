<html>
  <head>
    <title>Lab Task 05 - Text Analyzer</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <script>
      document.write("<h1>Text Analyzer</h1>");
      document.write("<h2>Lab Task 05</h2>");
    </script>

    <div class="analyzer-wrap">
      <label class="field-label" for="inputText">Paste your paragraph</label>
      <textarea
        id="inputText"
        class="text-input"
        rows="10"
        placeholder="Type or paste text here..."
      ></textarea>

      <div class="actions">
        <button type="button" class="primary-btn" id="analyzeBtn">
          Analyze Text
        </button>
        <button type="button" class="secondary-btn" id="clearBtn">
          Clear
        </button>
      </div>

      <div id="result" class="result-box" style="display: none">
        <h3>Analysis Result</h3>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-title">Total Characters</div>
            <div class="stat-value" id="charCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-title">Total Words</div>
            <div class="stat-value" id="wordCount">0</div>
          </div>
        </div>

        <div class="reversed">
          <div class="reversed-title">Reversed Text</div>
          <div class="reversed-text" id="reversedText"></div>
        </div>
      </div>

      <div id="emptyState" class="empty-state">
        Paste text above and click <b>Analyze Text</b> to see results.
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
