<html>
  <head>
    <script src="script.js"></script>
  </head>
  <body>
    <script>
      document.write("<h1>Login</h1>");
    </script>

    <div id="invalidCount" style="display: none; background: #ffdddd; padding: 10px; margin: 15px 0;">
      Wrong submissions: <span id="count">0</span>
    </div>

    <table>
      <tr>
        <td>Student Email <span style="color: red">*</span></td>
        <td>
          <input
            type="text"
            placeholder="Enter your email"
            id="email"
            name=""
            onchange="return getEmail();"
          />
        </td>
        <td>
          <p id="emailErr" style="color: red"></p>
        </td>
      </tr>
      <tr>
        <td>Password <span style="color: red">*</span></td>
        <td>
          <input
            type="text"
            placeholder="Enter your password"
            id="password"
            name=""
            onkeyup="return getPassword();"
          />
        </td>
        <td>
          <p id="pwdErr" style="color: red"></p>
        </td>
      </tr>
      <tr>
        <td></td>
        <td>
          <button type="submit" onclick="return collectFormData();">
            Submit
          </button>
        </td>
      </tr>
    </table>
  </body>
</html>
